{% extends "base.html" %}
{% block title %}Trade History{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-text">
    <h1 class="page-title">Trade History</h1>
    <p class="caption">All past trades — performance stats, click a row's Details link for the full report.</p>
  </div>
  <span class="live-status" id="live-status-tab5"><span class="live-dot" id="live-dot-tab5"></span><span id="live-text-tab5">LIVE</span> — charts refresh every 30s · <span id="live-updated-tab5">last update: —</span></span>
</div>

<div id="tab5-live">
  {% include "partials/tab5_live.html" %}
</div>

<script>
  startPolling("/api/tab5/live", "tab5-live", 2000, "tab5");
  startImageRefresh(30000);
</script>
{% endblock %}
